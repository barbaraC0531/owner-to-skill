<!doctype html>
<meta charset="utf-8">
<title>Owner to Skill</title>
<style>
  body { font-family: sans-serif; max-width: 1000px; margin: 2rem auto; }
  textarea { width: 100%; height: 9rem; }
  pre { background: #f5f5f5; padding: 1rem; white-space: pre-wrap; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
</style>
<h1>Owner-to-Skill</h1>
<p>Paste an owner interview, extract structured knowledge, draft SKILL.md, then test customer answers for unreliable claims.</p>
<textarea id="interview"></textarea>
<button id="analyzeButton">Analyze interview</button>
<div class="grid">
  <pre id="out"></pre>
  <section>
    <h2>Customer simulation test</h2>
    <textarea id="answer">We guarantee free same day delivery for every order.</textarea>
    <button id="auditButton">Audit answer</button>
    <pre id="auditOut"></pre>
  </section>
</div>
<script>
  let structured;
  interview.value = `We are Willow Pet Grooming in Dayton. We are open Tuesday through Saturday from 9 to 5. We groom dogs under 80 pounds and do not groom aggressive pets. Cancellations under 24 hours lose the deposit. Use a warm, reassuring tone.`;
  analyzeButton.addEventListener('click', analyze);
  auditButton.addEventListener('click', audit);

  async function analyze() {
    structured = await fetch('/api/analyze', { method: 'POST', body: JSON.stringify({ text: interview.value }) }).then(r => r.json());
    out.textContent = JSON.stringify(structured, null, 2);
  }

  async function audit() {
    if (!structured) await analyze();
    const result = await fetch('/api/audit', { method: 'POST', body: JSON.stringify({ answer: answer.value, structured }) }).then(r => r.json());
    auditOut.textContent = JSON.stringify(result, null, 2);
  }
</script>
